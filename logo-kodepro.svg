<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;display=swap');
    </style>
    <clipPath id="codeClip">
      <rect x="140" y="15" width="52" height="170" rx="8"/>
    </clipPath>
  </defs>
  <rect width="200" height="200" rx="24" fill="#060b09"/>
  <!-- K letter -->
  <text x="10" y="150" font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="140" fill="#27ae60">K</text>
  <!-- Square dot closer to K -->
  <rect x="112" y="122" width="26" height="26" rx="4" fill="#27ae60"/>
  <!-- Running code ticker -->
  <g clip-path="url(#codeClip)" opacity="0.35">
    <g font-family="'Courier New', monospace" font-size="7.5" fill="#27ae60">
      <animateTransform attributeName="transform" type="translate" from="0 0" to="0 -220" dur="10s" repeatCount="indefinite"/>
      <text x="144" y="30">bot.send()</text>
      <text x="144" y="48">fetch(api)</text>
      <text x="144" y="66">SELECT *</text>
      <text x="144" y="84">git push</text>
      <text x="144" y="102">npm build</text>
      <text x="144" y="120">docker up</text>
      <text x="144" y="138">res.json</text>
      <text x="144" y="156">async def</text>
      <text x="144" y="174">import os</text>
      <text x="144" y="192">yield()</text>
      <text x="144" y="210">redis.get</text>
      <text x="144" y="228">return {}</text>
      <!-- duplicate for seamless loop -->
      <text x="144" y="250">bot.send()</text>
      <text x="144" y="268">fetch(api)</text>
      <text x="144" y="286">SELECT *</text>
      <text x="144" y="304">git push</text>
      <text x="144" y="322">npm build</text>
      <text x="144" y="340">docker up</text>
      <text x="144" y="358">res.json</text>
      <text x="144" y="376">async def</text>
      <text x="144" y="394">import os</text>
      <text x="144" y="412">yield()</text>
      <text x="144" y="430">redis.get</text>
      <text x="144" y="448">return {}</text>
    </g>
  </g>
</svg>
